<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfficeFlow — จองห้องประชุมและรถยนต์</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root {
  --bg:         #ECEEF5;
  --panel:      #FFFFFF;
  --ink:        #0C1524;
  --muted:      #6B7280;
  --line:       #E5E7EB;

  --room:       #5B5CF6;
  --room-dark:  #4338CA;
  --room-soft:  #EEEEFF;
  --car:        #3bc2b0;
  --car-dark:   #148875;
  --car-soft:   #d3eee3;

  /* Per-room colors */
  --r0:       #5B5CF6; --r0-dark: #4338CA; --r0-soft: #EEEEFF;
  --r1:       #F59E0B; --r1-dark: #B45309; --r1-soft: #FEF3E2;
  --r2:       #10B981; --r2-dark: #047857; --r2-soft: #E6FAF1;
  --r3:       #EC4899; --r3-dark: #BE185D; --r3-soft: #FCE7F3;
  --r4:       #3B82F6; --r4-dark: #1D4ED8; --r4-soft: #E8F0FE;

  /* Active accent — switches via body class */
  --accent:       #5B5CF6;
  --accent-dark:  #4338CA;
  --accent-soft:  #EEEEFF;
  --accent-r: 91; --accent-g: 92; --accent-b: 246;

  --sh1: 0 1px 3px rgba(12,21,36,.05), 0 1px 2px rgba(12,21,36,.04);
  --sh2: 0 4px 20px rgba(12,21,36,.07), 0 2px 6px rgba(12,21,36,.04);
  --sh3: 0 24px 48px rgba(12,21,36,.15), 0 8px 16px rgba(12,21,36,.06);

  --dur: .22s;
  --ease: cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
}

body.mode-car {
  --accent:      #3bc2b0;
  --accent-dark: #148875;
  --accent-soft: #d3eee3;
  --accent-r: 164; --accent-g: 206; --accent-b: 139;
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background var(--dur) var(--ease);
}

/* Ambient mesh */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 55% 45% at 85% 8%, rgba(var(--accent-r),var(--accent-g),var(--accent-b),.06) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 5% 90%, rgba(16,185,129,.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
  transition: background var(--dur) var(--ease);
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.wrap {
  position: relative; z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 28px 24px 56px;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 30px; gap: 16px; flex-wrap: wrap;
}

.brand { display: flex; align-items: center; gap: 12px; }

.brand-ico {
  width: 42px; height: 42px; border-radius: 14px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  display: flex; align-items: center; justify-content: center; color: #fff;
  box-shadow: 0 8px 22px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.35);
  transition: background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.brand-ico i { width: 19px; height: 19px; }

.brand-name {
  font-family: 'Inter', sans-serif;
  font-size: 1.05rem; font-weight: 900;
  letter-spacing: -.03em; color: var(--ink); line-height: 1;
}
.brand-sub { font-size: .7rem; color: var(--muted); margin-top: 3px; font-weight: 500; }

#date-label {
  font-size: .8rem; color: var(--muted); font-weight: 600;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 999px; padding: 7px 16px;
  box-shadow: var(--sh1); white-space: nowrap;
}

/* ══════════════════════════════════════════
   TOOLBAR
══════════════════════════════════════════ */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
}
.pg-title {
  font-family: 'Inter', sans-serif;
  font-size: 1.3rem; font-weight: 900;
  letter-spacing: -.035em; color: var(--ink);
}
.toolbar-r { display: flex; align-items: center; gap: 10px; }

/* Pill tab toggle */
.tabs {
  display: flex; background: var(--panel);
  border: 1px solid var(--line); border-radius: 999px;
  padding: 4px; gap: 3px; box-shadow: var(--sh1);
}
.tab {
  border: none; background: transparent;
  color: var(--muted); font-family: 'Noto Sans Thai', sans-serif;
  font-size: .8rem; font-weight: 700;
  padding: 7px 17px; border-radius: 999px; cursor: pointer;
  transition: color var(--dur) var(--ease), background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  white-space: nowrap;
}
.tab.active {
  background: var(--accent); color: #ffffff;
  box-shadow: 0 4px 12px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.32);
}

/* Primary button */
.btn-add {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; background: var(--accent); color: white;
  font-family: 'Noto Sans Thai', sans-serif;
  font-size: .8rem; font-weight: 700;
  border: none; border-radius: 999px; cursor: pointer;
  box-shadow: 0 4px 14px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.36);
  transition: all var(--dur) var(--ease);
  white-space: nowrap;
}
.btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.42); }
.btn-add:active { transform: translateY(0); }
.btn-add i { width: 15px; height: 15px; }

/* ══════════════════════════════════════════
   PANEL
══════════════════════════════════════════ */
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: var(--sh2);
  overflow: hidden;
}

/* ══════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════ */
.cal-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 22px 14px;
}
#cal-month-label {
  font-family: 'Inter', sans-serif;
  font-size: 1rem; font-weight: 800; letter-spacing: -.02em;
}

.icon-btn {
  width: 36px; height: 36px;
  border: 1.5px solid var(--line); border-radius: 10px;
  background: #F8F9FB;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.icon-btn:hover {
  background: var(--accent-soft); color: var(--accent);
  border-color: transparent;
  transform: scale(1.05);
}
.icon-btn i { width: 16px; height: 16px; }

.cal-grid-wrap { padding: 0 18px 16px; }

/* Day-of-week header */
.cal-dow {
  text-align: center; font-size: .68rem; font-weight: 700;
  color: var(--muted); padding-bottom: 8px; letter-spacing: .05em;
  font-family: 'Inter', sans-serif;
}

#cal-grid {
  display: grid; grid-template-columns: repeat(7,1fr); gap: 5px;
}

/* Calendar cells */
.cal-cell {
  min-height: 50px; border-radius: 11px; padding: 7px 5px 5px;
  background: #F5F6FA;
  border: 1.5px solid transparent;
  cursor: pointer; position: relative;
  transition: transform .13s var(--ease), background .13s var(--ease), box-shadow .13s var(--ease);
}
.cal-cell.empty { background: transparent; cursor: default; border-color: transparent; }
.cal-cell:not(.empty):hover { transform: scale(1.06); background: var(--accent-soft); box-shadow: var(--sh1); }
.cal-cell.today { background: var(--accent); border-color: transparent; box-shadow: 0 4px 14px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.3); }
.cal-cell.today .num { color: #fff; }
.cal-cell.selected { border-color: var(--accent); background: var(--accent-soft); }
.cal-cell.has-room:not(.today) { background: rgba(91,92,246,.08); }
.cal-cell.has-car:not(.today) { background: rgba(245,158,11,.09); }
.cal-cell.has-room.has-car:not(.today) { background: linear-gradient(135deg, rgba(91,92,246,.08) 50%, rgba(245,158,11,.09) 50%); }

.cal-cell .num {
  font-size: .74rem; font-weight: 800; color: var(--ink);
  font-family: 'Inter', sans-serif; line-height: 1;
}
.cal-dots { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
.cal-dots span { display: block; width: 5px; height: 5px; border-radius: 50%; }
.cal-dots .r { background: var(--room); }
.cal-dots .c { background: var(--car); }

/* Divider */
.cal-sep { height: 1px; background: var(--line); margin: 0 18px; }

/* Calendar day list */
#cal-day-list { padding: 18px 22px 22px; }

/* Cal list heading */
.cal-list-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.cal-list-title {
  font-family: 'Inter', sans-serif; font-size: .82rem;
  font-weight: 800; letter-spacing: -.01em; color: var(--ink);
}
#cal-clear-date {
  font-size: .74rem; font-weight: 700; color: var(--accent);
  background: var(--accent-soft); border: none;
  border-radius: 8px; padding: 5px 12px; cursor: pointer;
  transition: opacity var(--dur) var(--ease);
}
#cal-clear-date:hover { opacity: .8; }

/* ══════════════════════════════════════════
   BOOKING CARDS
══════════════════════════════════════════ */
.day-card {
  background: #FAFBFD;
  border: 1.5px solid var(--line);
  border-left: 4px solid var(--line);
  border-radius: 12px;
  padding: 13px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.day-card:last-child { margin-bottom: 0; }
.day-card[data-kind="room"] { border-left-color: var(--room); }
.day-card[data-kind="car"]  { border-left-color: var(--car); }
.day-card:hover { transform: translateX(5px); box-shadow: var(--sh2); background: #fff; }

.day-card .row1 {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 10px; font-weight: 700; font-size: .88rem; margin-bottom: 6px;
}
.day-card .meta {
  font-size: .76rem; color: var(--muted); line-height: 1.75;
}
.day-card .meta b { color: var(--ink); font-weight: 600; }

.badge {
  font-size: .67rem; padding: 3px 10px;
  border-radius: 999px; font-weight: 700;
  white-space: nowrap; flex-shrink: 0;
  font-family: 'Inter', sans-serif;
}
.badge.room { background: var(--room-soft); color: var(--room); }
.badge.car  { background: var(--car-soft);  color: var(--car-dark); }
.badge.r0 { background: var(--r0-soft); color: var(--r0-dark); }
.badge.r1 { background: var(--r1-soft); color: var(--r1-dark); }
.badge.r2 { background: var(--r2-soft); color: var(--r2-dark); }
.badge.r3 { background: var(--r3-soft); color: var(--r3-dark); }
.badge.r4 { background: var(--r4-soft); color: var(--r4-dark); }
.day-card.rc0 { border-left-color: var(--r0); }
.day-card.rc1 { border-left-color: var(--r1); }
.day-card.rc2 { border-left-color: var(--r2); }
.day-card.rc3 { border-left-color: var(--r3); }
.day-card.rc4 { border-left-color: var(--r4); }
.cal-dots .r0 { background: var(--r0); }
.cal-dots .r1 { background: var(--r1); }
.cal-dots .r2 { background: var(--r2); }
.cal-dots .r3 { background: var(--r3); }
.cal-dots .r4 { background: var(--r4); }
.room-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.room-legend-item { display: flex; align-items: center; gap: 5px; font-size: .72rem; font-weight: 600; color: var(--muted); }
.room-legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* Empty state */
.empty-msg {
  text-align: center; padding: 28px 12px;
  font-size: .8rem; color: var(--muted); opacity: .8;
}

/* ══════════════════════════════════════════
   SECTION BELOW CALENDAR
══════════════════════════════════════════ */
.sect { margin-top: 14px; }
.sect-inner { padding: 22px; }
.sect-title {
  font-family: 'Inter', sans-serif;
  font-size: .95rem; font-weight: 800;
  letter-spacing: -.02em; margin-bottom: 4px;
}
.sect-sub { font-size: .74rem; color: var(--muted); margin-bottom: 16px; }

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(12,21,36,.52);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  padding: 20px; z-index: 50;
}
.modal-backdrop.show { display: flex; }

.modal {
  width: min(480px,100%);
  background: #fff; border-radius: 24px;
  box-shadow: var(--sh3);
  max-height: 92vh; overflow-y: auto;
  animation: modalIn .28s var(--spring);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(22px) scale(.95); }
  to   { opacity: 1; transform: none; }
}

.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 22px 0; margin-bottom: 20px;
}
.modal-head h2 {
  font-family: 'Inter', sans-serif;
  font-size: 1.05rem; font-weight: 900; letter-spacing: -.025em;
}
.modal-body { padding: 0 22px 22px; }

/* ── Form fields ── */
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: .7rem; font-weight: 700;
  color: var(--muted); margin-bottom: 6px;
  letter-spacing: .05em; text-transform: uppercase;
  font-family: 'Inter', sans-serif;
}
.field input, .field select, .field textarea {
  width: 100%; border: 1.5px solid var(--line);
  border-radius: 11px; padding: 10px 12px;
  font-family: 'Noto Sans Thai', sans-serif;
  font-size: .88rem; outline: none;
  background: #F8F9FB; color: var(--ink);
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
}
/* Force 24h time display - hide AM/PM */
input[type="time"]::-webkit-datetime-edit-ampm-field {
  display: none !important;
  width: 0 !important;
  visibility: hidden !important;
}
input[type="time"] {
  -webkit-appearance: none;
  appearance: none;
}

.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent); background: #fff;
  box-shadow: 0 0 0 3.5px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.12);
}
.field textarea { min-height: 88px; resize: vertical; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

/* Form buttons */
.form-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding-top: 8px; border-top: 1px solid var(--line); margin-top: 8px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; border-radius: 11px;
  font-family: 'Noto Sans Thai', sans-serif;
  font-size: .82rem; font-weight: 700;
  cursor: pointer; transition: all var(--dur) var(--ease);
  border: none; white-space: nowrap;
}
.btn-ghost {
  background: transparent; border: 1.5px solid var(--line); color: var(--muted);
}
.btn-ghost:hover { background: #F5F6FA; }
.btn-danger { background: #FEF2F2; color: #DC2626; border: 1.5px solid #FECACA; }
.btn-danger:hover { background: #FEE2E2; }
.btn-save {
  background: var(--accent); color: white;
  box-shadow: 0 4px 12px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.3);
}
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.42); }

/* Companion rows */
.companion-row { display: flex; gap: 8px; margin-bottom: 8px; }
.companion-input {
  flex: 1; border: 1.5px solid var(--line); border-radius: 11px; padding: 9px 12px;
  font-family: 'Noto Sans Thai', sans-serif; font-size: .88rem; outline: none;
  background: #F8F9FB; color: var(--ink); transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
}
.companion-input:focus {
  border-color: var(--accent); background: #fff;
  box-shadow: 0 0 0 3.5px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.12);
}
#car-add-companion {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .76rem; font-weight: 700; color: var(--accent);
  background: var(--accent-soft); border: none;
  border-radius: 9px; padding: 7px 12px; cursor: pointer; margin-top: 2px;
  transition: opacity var(--dur) var(--ease);
}
#car-add-companion:hover { opacity: .8; }
#car-add-companion i { width: 13px; height: 13px; }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
.toast {
  position: fixed; right: 22px; bottom: 22px;
  background: var(--ink); color: #fff;
  border-radius: 13px; padding: 12px 18px;
  font-size: .84rem; font-weight: 600;
  box-shadow: var(--sh3);
  opacity: 0; transform: translateY(18px);
  pointer-events: none; z-index: 60;
  transition: .28s var(--spring);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Center popup alert */
.popup-overlay {
  position: fixed; inset: 0;
  background: rgba(12,21,36,.45);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0;
  pointer-events: none;
  transition: opacity .22s var(--ease);
}
.popup-overlay.show { opacity: 1; pointer-events: all; }
.popup-box {
  background: #fff; border-radius: 20px;
  box-shadow: var(--sh3);
  padding: 28px 32px; max-width: 380px; width: 90%;
  text-align: center;
  transform: scale(.92) translateY(14px);
  transition: transform .28s var(--spring);
}
.popup-overlay.show .popup-box { transform: none; }
.popup-icon {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  font-size: 1.5rem;
}
.popup-icon.success { background: #E6FAF1; color: #10B981; }
.popup-icon.error   { background: #FEF2F2; color: #DC2626; }
.popup-icon.info    { background: #EEF2FF; color: #5B5CF6; }
.popup-icon.warning { background: #FEF9E7; color: #F59E0B; }
.popup-title {
  font-family: 'Inter', sans-serif;
  font-size: 1rem; font-weight: 800;
  letter-spacing: -.02em; color: var(--ink);
  margin-bottom: 8px;
}
.popup-msg {
  font-size: .84rem; color: var(--muted);
  line-height: 1.6; margin-bottom: 20px;
}
.popup-btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 28px; border-radius: 11px;
  font-family: 'Noto Sans Thai', sans-serif;
  font-size: .84rem; font-weight: 700;
  border: none; cursor: pointer;
  background: var(--accent); color: white;
  box-shadow: 0 4px 12px rgba(var(--accent-r),var(--accent-g),var(--accent-b),.3);
  transition: all var(--dur) var(--ease);
}
.popup-btn:hover { transform: translateY(-1px); }
.popup-btn.secondary {
  background: #F5F6FA; color: var(--muted);
  box-shadow: none; border: 1.5px solid var(--line);
  margin-right: 8px;
}
/* GAS Config panel */
.gas-config-panel {
  background: #fff; border: 1.5px solid var(--line);
  border-radius: 16px; padding: 18px 20px;
  margin-top: 4px; box-shadow: var(--sh2);
  display: none;
}
.gas-config-panel.show { display: block; }
.gas-config-panel input {
  width: 100%; border: 1.5px solid var(--line);
  border-radius: 10px; padding: 9px 12px;
  font-size: .84rem; font-family: monospace;
  color: var(--ink); background: #F8F9FB;
  outline: none; margin-bottom: 10px;
}
.gas-config-panel input:focus { border-color: var(--accent); background: #fff; }
.gas-config-label {
  font-size: .7rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 6px; display: block;
  font-family: 'Inter', sans-serif;

/* Room color palette index */
const ROOM_COLORS = ['r0','r1','r2','r3','r4'];
function roomColorIdx(roomName){ return ROOMS.indexOf(roomName) % ROOM_COLORS.length; }
function roomColorClass(roomName){ const i=ROOMS.indexOf(roomName); return i>=0 ? ROOM_COLORS[i % ROOM_COLORS.length] : 'r0'; }

function pad(n){ return n.toString().padStart(2,'0'); }
function ymd(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtThaiDate(s){
  if(!s) return '-';
  const [y,m,d]=s.split('-').map(Number);
  return `${pad(d)}/${pad(m)}/${y+543}`;
}
/* parse dd/mm/yyyy(BE) → yyyy-mm-dd(AD) internal */
function parseDmyToYmd(str){
  if(!str) return '';
  if(str.includes('-')) return str; // already ymd
  const parts = str.split('/');
  if(parts.length!==3) return '';
  let [d,m,y] = parts.map(Number);
  if(y>2400) y = y-543; // convert BE to AD
  return `${y}-${pad(m)}-${pad(d)}`;
}
/* yyyy-mm-dd → dd/mm/yyyy(BE) for display in input */
function ymdToDmy(s){
  if(!s) return '';
  const [y,m,d]=s.split('-').map(Number);
  return `${pad(d)}/${pad(m)}/${y+543}`;
}
function fmtTime(t){ return t ? t+' น.' : '-'; }

let ROOM_BOOKINGS = [];
let CAR_BOOKINGS  = [];

async function loadData(){
  try{ const r=await window.storage.get('rooms',true); ROOM_BOOKINGS=r?JSON.parse(r.value):SEED_ROOMS.map(x=>({...x,id:uid(),kind:'room'})); }
  catch(e){ ROOM_BOOKINGS=SEED_ROOMS.map(x=>({...x,id:uid(),kind:'room'})); }
  try{ const c=await window.storage.get('cars',true); CAR_BOOKINGS=c?JSON.parse(c.value):SEED_CARS.map(x=>({...x,id:uid(),kind:'car'})); }
  catch(e){ CAR_BOOKINGS=SEED_CARS.map(x=>({...x,id:uid(),kind:'car'})); }
}
async function saveRooms(){ try{ await window.storage.set('rooms',JSON.stringify(ROOM_BOOKINGS),true); }catch(e){ console.error(e); } }
async function saveCars(){  try{ await window.storage.set('cars', JSON.stringify(CAR_BOOKINGS), true); }catch(e){ console.error(e); } }

function todayStr(){ return ymd(new Date()); }

function escapeHtml(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const carCompanionsContainer = document.getElementById('car-companions');
const carAddCompanionBtn     = document.getElementById('car-add-companion');

function companionRowHtml(v){
  return `<div class="companion-row">
    <input type="text" class="companion-input" placeholder="ชื่อ-นามสกุล" value="${escapeHtml(v||'')}">
    <button type="button" class="icon-btn companion-remove" aria-label="ลบ"><i data-lucide="x"></i></button>
  </div>`;
}
function addCompanionRow(v){
  carCompanionsContainer.insertAdjacentHTML('beforeend', companionRowHtml(v));
  if(window.lucide) lucide.createIcons();
  const rows = carCompanionsContainer.querySelectorAll('.companion-row');
  const last = rows[rows.length-1];
  last.querySelector('.companion-remove').addEventListener('click', ()=>last.remove());
}
function resetCompanions(vals){
  carCompanionsContainer.innerHTML='';
  (vals&&vals.length?vals:[''] ).forEach(v=>addCompanionRow(v));
}
function getCompanions(){
  return Array.from(carCompanionsContainer.querySelectorAll('.companion-input'))
    .map(i=>i.value.trim()).filter(v=>v.length>0);
}
carAddCompanionBtn.addEventListener('click',()=>addCompanionRow(''));

function populateSelects(){
  const roomSel = document.getElementById('room-select');
  roomSel.innerHTML = ROOMS.map(r=>`<option value="${escapeHtml(r)}">${escapeHtml(r)}</option>`).join('');

  const deptOpts = DEPTS.map(d=>`<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
  document.getElementById('room-dept').innerHTML = deptOpts;
  document.getElementById('car-dept').innerHTML  = deptOpts;

  const uPlates  = [...new Set(VEHICLES.map(v=>v.plate))];
  const uDrivers = [...new Set(VEHICLES.map(v=>v.driver))];
  document.getElementById('car-plate').innerHTML  = uPlates.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
  document.getElementById('car-driver').innerHTML = uDrivers.map(d=>`<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
}

      document.getElementById('car-driver').value      = entry.driver||'';
      resetCompanions(entry.companions||[]);
    } else {
      resetCompanions([]);
    }
  }

  if(deleteBtn) deleteBtn.classList.toggle('hidden',!entry);
  modal.classList.add('show');
  modal.setAttribute('aria-hidden','false');
}

function closeModal(){
  modal.classList.remove('show');
  modal.setAttribute('aria-hidden','true');
  form.reset();
  setAllDates();
  resetCompanions([]);
  formError.classList.add('hidden');
  editingId=null; editingKind=null;
}

function showToast(msg){
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2600);
}

/* ── Popup system ── */
let _popupResolve = null;
function showPopup({ type='info', title='', msg='', okLabel='ตกลง', cancelLabel=null }){
  return new Promise(resolve=>{
    _popupResolve = resolve;
    const overlay   = document.getElementById('popup-overlay');
    const iconEl    = document.getElementById('popup-icon');
    const titleEl   = document.getElementById('popup-title');
    const msgEl     = document.getElementById('popup-msg');
    const okBtn     = document.getElementById('popup-ok-btn');
    const cancelBtn = document.getElementById('popup-cancel-btn');

    const icons = { success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
    iconEl.className = `popup-icon ${type}`;
    iconEl.textContent = icons[type] || 'ℹ';
    titleEl.textContent = title;
    msgEl.textContent = msg;
    okBtn.textContent = okLabel;

    if(cancelLabel){
      cancelBtn.textContent = cancelLabel;
      cancelBtn.style.display = '';
    } else {
      cancelBtn.style.display = 'none';
    }
    overlay.classList.add('show');
  });
}
function closePopup(result){
  document.getElementById('popup-overlay').classList.remove('show');
  if(_popupResolve){ _popupResolve(result); _popupResolve=null; }
}
document.getElementById('popup-ok-btn').addEventListener('click', ()=>closePopup(true));
document.getElementById('popup-cancel-btn').addEventListener('click', ()=>closePopup(false));
document.getElementById('popup-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('popup-overlay')) closePopup(false);
});
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('popup-overlay').classList.contains('show')){
    e.preventDefault(); closePopup(true);
  }
});

newBookingBtn.addEventListener('click',()=>openModal(listTab));
closeModalBtn.addEventListener('click',closeModal);
cancelModalBtn.addEventListener('click',closeModal);
// Close only when clicking the dark backdrop (not the white card)
modal.addEventListener('mousedown', e=>{
  if(e.target === modal) {
    e._clickedBackdrop = true;
  }
});
modal.addEventListener('click', e=>{
  if(e._clickedBackdrop) closeModal();
});
// ESC key closes modal
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('popup-overlay').classList.contains('show')){
      closePopup(false); return;
    }
    if(modal.classList.contains('show')) closeModal();
  }
});

/* ── Entry card HTML ── */
function entryCardHtml(e,kind){
  if(kind==='room'){
    const ri = ROOMS.indexOf(e.room);
    const rc = ri >= 0 ? ri % ROOM_COLORS.length : 0;
    const colorClass = ROOM_COLORS[rc];
    return `<div class="day-card rc${rc}" data-kind="room" data-id="${e.id}">
      <div class="row1">
        <span>${escapeHtml(e.room)}</span>
        <span class="badge ${colorClass}">${fmtThaiDate(e.date)}</span>
      </div>
      <div class="meta">
        <b>เวลา</b> ${fmtTime(e.timeStart)} – ${fmtTime(e.timeEnd)} &nbsp;·&nbsp; ${escapeHtml(e.dept||'')}
        <br><b>ผู้แจ้งขอใช้:</b> ${escapeHtml(e.requester||'')} &nbsp;·&nbsp; <b>ผู้เข้าร่วม:</b> ${e.attendees||1} คน<br>
        ${escapeHtml(e.purpose||'')}
        ${(e.note&&e.note!=='-')?`<br><b>หมายเหตุ:</b> ${escapeHtml(e.note)}`:''}
      </div>
    </div>`;
  } else {
    const companions=(e.companions&&e.companions.length)
      ?`<br><b>ผู้ร่วมเดินทาง:</b> ${e.companions.map(escapeHtml).join(', ')}`:'';
    return `<div class="day-card" data-kind="car" data-id="${e.id}">
      <div class="row1">
        <span>${escapeHtml(e.plate)} — ${escapeHtml(e.driver)}</span>
        <span class="badge car">${fmtThaiDate(e.date)}</span>
      </div>
      <div class="meta">
        <b>เวลา</b> ${fmtTime(e.timeStart)} – ${fmtTime(e.timeEnd)} &nbsp;·&nbsp; ${escapeHtml(e.dept||'')}
        <br><b>ผู้ขอ:</b> ${escapeHtml(e.requester||'')} (${e.numPeople||1} คน)<br>
        ${escapeHtml(e.purpose||'')} · ${escapeHtml(e.destination||'')}${companions}
      </div>
    </div>`;
  }
}

function attachCardClickHandlers(container){
  container.querySelectorAll('.day-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const id=card.dataset.id, kind=card.dataset.kind;
      const entry=(kind==='room'?ROOM_BOOKINGS:CAR_BOOKINGS).find(x=>x.id===id);

/* ── Calendar ── */
function renderCalendar(){
  const year=calCurrent.getFullYear(), month=calCurrent.getMonth();
  calMonthLabel.textContent=`${MONTHS[month]} ${year+543}`;

  const first=new Date(year,month,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=todayStr();

  const allGrouped={};
  ROOM_BOOKINGS.forEach(r=>{
    if(!r.date) return;
    allGrouped[r.date]=allGrouped[r.date]||{room:0,car:0,rooms:Array(ROOMS.length).fill(0)};
    allGrouped[r.date].room++;
    const ri=ROOMS.indexOf(r.room); if(ri>=0) allGrouped[r.date].rooms[ri]++;
  });
  CAR_BOOKINGS.forEach(c=>{
    if(!c.date) return;
    allGrouped[c.date]=allGrouped[c.date]||{room:0,car:0,rooms:Array(ROOMS.length).fill(0)};
    allGrouped[c.date].car++;
  });

  let html='';
  ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(d=>{ html+=`<div class="cal-dow">${d}</div>`; });

  for(let i=0;i<startDow;i++) html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${pad(month+1)}-${pad(d)}`;
    const info=allGrouped[dateStr];
    let cls='cal-cell';
    if(dateStr===today) cls+=' today';
    if(info&&info.room>0) cls+=' has-room';
    if(info&&info.car>0)  cls+=' has-car';
    if(dateStr===calSelectedDate) cls+=' selected';
    let dots='';
    if(info){
      if(info.rooms) {
        info.rooms.forEach((count,ri)=>{ for(let k=0;k<Math.min(count,2);k++) dots+=`<span class="r${ri}"></span>`; });
      } else {
        for(let i=0;i<Math.min(info.room,3);i++) dots+='<span class="r0"></span>';
      }
      for(let i=0;i<Math.min(info.car,3);i++)  dots+='<span class="c"></span>';
    }
    html+=`<div class="${cls}" data-date="${dateStr}"><div class="num">${d}</div>${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;
  }
  calGrid.innerHTML=html;

  // Use event delegation for calendar cells (more reliable than per-cell listeners)
  calGrid.onclick = function(e){
    const cell = e.target.closest('.cal-cell:not(.empty)');
    if(!cell) return;
    const date = cell.dataset.date;
    if(!date) return;
    calSelectedDate = (calSelectedDate===date) ? null : date;
    renderCalendar();
  };
  renderCalDayList();
}

function renderCalDayList(){
  const source=listTab==='room'?ROOM_BOOKINGS:CAR_BOOKINGS;
  let list, heading;
  if(calSelectedDate){
    list=source.filter(e=>e.date===calSelectedDate);
    heading=`รายการวันที่ ${fmtThaiDate(calSelectedDate)}`;
  } else {
    list=source.filter(e=>e.date>=todayStr());
    heading=listTab==='room'?'รายการจองห้องประชุมที่จะถึง':'รายการขอใช้รถที่จะถึง';
  }
  list=list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  let html=`<div class="cal-list-head">
    <span class="cal-list-title">${heading}</span>
    ${calSelectedDate?`<button id="cal-clear-date">ดูทั้งหมด</button>`:''}
  </div>`;

  if(list.length===0){
    html+='<div class="empty-msg">ยังไม่มีรายการ'+(calSelectedDate?' ในวันนี้':'')+'</div>';
  } else {
    html+=`<div style="max-height:300px;overflow-y:auto;">${list.map(e=>entryCardHtml(e,listTab)).join('')}</div>`;
  }

  calDayList.innerHTML=html;
  attachCardClickHandlers(calDayList);
  const clearBtn=document.getElementById('cal-clear-date');
  if(clearBtn) clearBtn.addEventListener('click',()=>{ calSelectedDate=null; renderCalendar(); });
}

/* ── GAS Sync ── */
let GAS_URL = '';
try { GAS_URL = localStorage.getItem('gas_url') || ''; } catch(e){}

function updateGasStatusBadge(){
  const badge = document.getElementById('gas-status-badge');
  if(!badge) return;
  if(GAS_URL){
    badge.className='gas-status ok';
    badge.textContent='● URL ตั้งค่าแล้ว';
  } else {
    badge.className='gas-status none';
    badge.textContent='● ยังไม่ได้ตั้งค่า';
  }
}

function setupGasSync(){
  const btn     = document.getElementById('gas-sync-btn');
  const cfgBtn  = document.getElementById('gas-cfg-btn');
  const cfgPanel= document.getElementById('gas-config-panel');
  const urlInput= document.getElementById('gas-url-input');
  const saveBtn = document.getElementById('gas-url-save');
  const cancelBtn=document.getElementById('gas-url-cancel');
  if(!btn||!cfgBtn||!cfgPanel||!urlInput) return;

  // Populate current URL
  urlInput.value = GAS_URL;
  updateGasStatusBadge();

  cfgBtn.addEventListener('click', ()=>{
    urlInput.value = GAS_URL;
    cfgPanel.classList.toggle('show');
  });
  cancelBtn.addEventListener('click', ()=>cfgPanel.classList.remove('show'));
  saveBtn.addEventListener('click', ()=>{
    const url = urlInput.value.trim();
    GAS_URL = url;
    try { localStorage.setItem('gas_url', url); } catch(e){}
    cfgPanel.classList.remove('show');
    updateGasStatusBadge();
    showPopup({ type:'success', title:'บันทึก URL แล้ว', msg:'ตั้งค่า Google Apps Script URL เรียบร้อย พร้อมซิ้งค์ข้อมูล' });
  });

  btn.addEventListener('click', async ()=>{
    if(!GAS_URL){
      await showPopup({
        type:'warning', title:'ยังไม่ได้ตั้งค่า GAS URL',
        msg:'กรุณากด ⚙️ เพื่อวาง Google Apps Script Web App URL ก่อนซิ้งค์'
      });
      return;
    }
    // Show loading state
    btn.disabled=true;
    const btnIcon = btn.querySelector('i');
    const btnSpan = btn.querySelector('span');
    if(btnSpan) btnSpan.textContent='กำลังซิ้งค์...';

    try{
      const payload = { rooms: ROOM_BOOKINGS, cars: CAR_BOOKINGS };
      // ส่งเป็น URLSearchParams + text/plain เพื่อหลีกเลี่ยง CORS preflight
      const body = 'payload=' + encodeURIComponent(JSON.stringify(payload));

      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',          // GAS ไม่ส่ง CORS headers กลับมา จึงต้องใช้ no-cors
        headers: { 'Content-Type': 'text/plain' },
        body: body
      });

      // no-cors = ไม่รู้ผลลัพธ์ แต่ถ้า fetch ไม่ throw = ส่งได้แล้ว
      if(btnSpan) btnSpan.textContent='ซิ้งค์ Sheet';
      btn.disabled=false;
      await showPopup({
        type:'success',
        title:'ส่งข้อมูลสำเร็จ ✓',
        msg:`ส่งข้อมูลไปยัง Google Sheet แล้ว
🏢 ห้องประชุม: ${ROOM_BOOKINGS.length} รายการ
🚗 รถยนต์: ${CAR_BOOKINGS.length} รายการ

(ตรวจสอบใน Google Sheet ได้เลย)`
      });
    } catch(err){
      if(btnSpan) btnSpan.textContent='ซิ้งค์ Sheet';
      btn.disabled=false;
      await showPopup({
        type:'error', title:'ซิ้งค์ล้มเหลว',
        msg:'เกิดข้อผิดพลาด: ' + err.message +
            '

สิ่งที่ต้องตรวจสอบ:
• GAS URL ถูกต้องหรือไม่
• Deploy ใหม่เลือก "Anyone" แล้วหรือยัง
• ดู Console (F12) สำหรับ error เพิ่มเติม'
      });
    }
  });
}
